<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>妈妈，母亲节快乐 ❤</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;min-height:100vh;overflow-x:hidden}

  body {
    background:#06010f;
    font-family:'Noto Serif SC','PingFang SC','Songti SC','STSong',serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100vh;position:relative;overflow:hidden;
  }

  canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

  .page{
    position:relative;z-index:2;
    width:100%;max-width:420px;
    padding:0 0 60px;
    display:flex;flex-direction:column;align-items:center;
  }

  /* Top greeting */
  .top-msg{
    margin-top:48px;
    text-align:center;
    animation:fadeDown 1.2s ease both;
  }
  .top-msg .sub{
    font-size:13px;letter-spacing:5px;
    color:rgba(255,180,210,0.6);margin-bottom:12px;
    font-family:'PingFang SC',sans-serif;
    font-style:italic;
  }
  .top-msg h1{
    font-size:30px;font-weight:700;
    color:#fff;letter-spacing:6px;
    text-shadow:0 0 30px rgba(255,100,160,0.8),0 0 60px rgba(255,60,120,0.4);
    line-height:1.4;
  }
  .top-msg h1 span{
    color:#ff7cc0;
    text-shadow:0 0 20px #ff4da0,0 0 40px #ff1a80;
  }

  /* Heart canvas */
  .heart-wrap{
    position:relative;width:300px;height:260px;margin:30px 0 10px;
    animation:fadeUp 1.4s 0.3s ease both;
  }
  #heartCanvas{width:100%;height:100%}

  /* Card */
  .card{
    width:calc(100% - 40px);
    background:rgba(255,255,255,0.04);
    border:0.5px solid rgba(255,120,180,0.25);
    border-radius:20px;
    padding:28px 26px;
    margin:0 20px;
    backdrop-filter:blur(10px);
    animation:fadeUp 1.4s 0.6s ease both;
  }
  .card .poem-line{
    font-size:15px;color:rgba(255,210,230,0.9);
    line-height:2.2;letter-spacing:2px;
    text-align:center;
  }
  .card .poem-line:first-child{
    font-size:14px;color:rgba(255,160,200,0.6);
    margin-bottom:6px;letter-spacing:4px;
  }
  .card .divider{
    width:40px;height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,120,170,0.5),transparent);
    margin:16px auto;
  }
  .card .wish{
    font-size:14px;color:rgba(255,190,220,0.75);
    line-height:2;letter-spacing:1px;text-align:center;
    font-family:'PingFang SC',sans-serif;
  }

  /* Signature */
  .sign{
    margin-top:28px;text-align:center;
    animation:fadeUp 1.4s 0.9s ease both;
  }
  .sign p{
    font-size:13px;color:rgba(255,160,200,0.5);
    letter-spacing:3px;font-family:'PingFang SC',sans-serif;
  }
  .sign .name{
    font-size:18px;color:rgba(255,200,225,0.85);
    margin-top:8px;letter-spacing:4px;
    text-shadow:0 0 15px rgba(255,100,160,0.4);
  }

  /* Boom button */
  .btn-row{
    margin-top:32px;display:flex;gap:14px;
    animation:fadeUp 1.4s 1.1s ease both;
  }
  .btn{
    font-family:'PingFang SC',sans-serif;
    font-size:14px;letter-spacing:2px;
    padding:11px 26px;border-radius:30px;
    border:1px solid rgba(255,120,180,0.4);
    background:rgba(255,50,120,0.12);
    color:rgba(255,190,220,0.9);cursor:pointer;
    transition:all 0.2s;
    -webkit-appearance:none;
  }
  .btn:active{
    background:rgba(255,50,120,0.3);
    border-color:rgba(255,120,180,0.8);
    transform:scale(0.97);
  }

  /* Floating hearts */
  .floats{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}

  @keyframes fadeDown{
    from{opacity:0;transform:translateY(-24px)}
    to{opacity:1;transform:translateY(0)}
  }
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(24px)}
    to{opacity:1;transform:translateY(0)}
  }
  @keyframes floatUp{
    0%{transform:translateY(0) scale(1);opacity:0.8}
    100%{transform:translateY(-100vh) scale(0.4) rotate(20deg);opacity:0}
  }
  @keyframes twinkle{
    0%,100%{opacity:0.2}50%{opacity:1}
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="floats" id="floats"></div>

<div class="page">
  <div class="top-msg">
    <p class="sub">献给世界上最重要的人</p>
    <h1>妈妈<br><span>母亲节快乐</span></h1>
  </div>

  <div class="heart-wrap">
    <canvas id="heartCanvas"></canvas>
  </div>

  <div class="card">
    <p class="poem-line">——致我最亲爱的妈妈</p>
    <div class="divider"></div>
    <p class="poem-line">您的手，牵我走过第一步</p>
    <p class="poem-line">您的声音，是我最温柔的港湾</p>
    <p class="poem-line">无论我走多远，走多高</p>
    <p class="poem-line">您永远是我心里最亮的星</p>
    <div class="divider"></div>
    <p class="wish">感谢您这么多年的付出与守护<br>今天，只想对您说一句<br>妈妈，我爱您 ❤</p>
  </div>

  <div class="sign">
    <p>永远爱您的</p>
    <p class="name" id="senderName">您的孩子</p>
  </div>

  <div class="btn-row">
    <button class="btn" onclick="triggerFireworks()">🎆 烟花</button>
    <button class="btn" onclick="moreHearts()">❤ 爱心雨</button>
  </div>
</div>

<script>
// ---- Stars background ----
const bgCanvas = document.getElementById('bg');
const bgCtx = bgCanvas.getContext('2d');
let W, H;
function resizeBg(){
  W = bgCanvas.width = window.innerWidth;
  H = bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

const stars = Array.from({length:100},()=>({
  x:Math.random(), y:Math.random(),
  r:0.4+Math.random()*1.4,
  t:Math.random()*Math.PI*2,
  spd:0.008+Math.random()*0.015
}));

function drawBg(){
  bgCtx.clearRect(0,0,W,H);
  // deep gradient
  const g = bgCtx.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,W*0.7);
  g.addColorStop(0,'#1a0530');
  g.addColorStop(1,'#06010f');
  bgCtx.fillStyle=g;
  bgCtx.fillRect(0,0,W,H);
  // stars
  stars.forEach(s=>{
    s.t+=s.spd;
    const a=0.15+0.7*Math.pow(Math.sin(s.t),2);
    bgCtx.save();
    bgCtx.globalAlpha=a;
    bgCtx.beginPath();
    bgCtx.arc(s.x*W,s.y*H*0.9,s.r,0,Math.PI*2);
    bgCtx.fillStyle='#fff';
    bgCtx.fill();
    bgCtx.restore();
  });
}

// ---- Heart canvas ----
const hc = document.getElementById('heartCanvas');
const hctx = hc.getContext('2d');
hc.width = 600; hc.height = 520;

const TOTAL = 200;
const heartPts = [];
for(let t=0;t<Math.PI*2;t+=0.07){
  heartPts.push({
    x: 16*Math.pow(Math.sin(t),3),
    y: -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  });
}

class Particle{
  constructor(){this.reset(true)}
  reset(init){
    const pt = heartPts[Math.floor(Math.random()*heartPts.length)];
    const sc = 14+Math.random()*2;
    this.tx = 300 + pt.x*sc + (Math.random()-.5)*18;
    this.ty = 260 + pt.y*sc + (Math.random()-.5)*18;
    if(init){
      this.x=300+(Math.random()-.5)*600;
      this.y=260+(Math.random()-.5)*520;
    } else {
      this.x=this.tx+(Math.random()-.5)*300;
      this.y=this.ty+(Math.random()-.5)*300;
    }
    this.r=1.4+Math.random()*2.2;
    this.alpha=0;
    this.age=0;
    this.life=150+Math.random()*80;
    this.phase=Math.random()*Math.PI*2;
    const h=330+Math.random()*50;
    this.color=`hsl(${h},90%,${60+Math.random()*25}%)`;
  }
  update(){
    this.age++;
    const p=Math.min(this.age/70,1);
    this.x+=(this.tx-this.x)*0.055;
    this.y+=(this.ty-this.y)*0.055;
    this.alpha=this.age<20?this.age/20:(this.age>this.life*0.7?(1-(this.age-this.life*0.7)/(this.life*0.3)):1);
    this.alpha=Math.max(0,Math.min(1,this.alpha));
    const pulse=1+0.18*Math.sin(this.age*0.07+this.phase);
    this.dr=this.r*pulse;
    if(this.age>this.life)this.reset(false);
  }
  draw(){
    hctx.save();
    hctx.globalAlpha=this.alpha*0.85;
    hctx.shadowColor=this.color;
    hctx.shadowBlur=10;
    hctx.beginPath();
    hctx.arc(this.x,this.y,this.dr,0,Math.PI*2);
    hctx.fillStyle=this.color;
    hctx.fill();
    hctx.restore();
  }
}

const particles=Array.from({length:TOTAL},()=>new Particle());

// ---- Fireworks ----
const sparks=[];
class Spark{
  constructor(x,y,color){
    this.x=x;this.y=y;
    const a=Math.random()*Math.PI*2,s=1.5+Math.random()*5;
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;
    this.alpha=1;this.color=color;this.r=1.2+Math.random()*2;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=0.1;this.vx*=0.97;this.vy*=0.97;
    this.alpha-=0.02;
  }
  draw(){
    bgCtx.save();
    bgCtx.globalAlpha=Math.max(0,this.alpha);
    bgCtx.beginPath();
    bgCtx.arc(this.x,this.y,this.r,0,Math.PI*2);
    bgCtx.fillStyle=this.color;
    bgCtx.shadowColor=this.color;
    bgCtx.shadowBlur=8;
    bgCtx.fill();
    bgCtx.restore();
  }
}

function triggerFireworks(){
  const colors=['#ff6bb5','#ffb347','#ffe066','#a0f5c0','#80cfff','#ff99cc','#fff'];
  for(let i=0;i<4;i++){
    setTimeout(()=>{
      const x=W*(0.2+Math.random()*0.6);
      const y=H*(0.1+Math.random()*0.45);
      const c=colors[Math.floor(Math.random()*colors.length)];
      for(let j=0;j<90;j++) sparks.push(new Spark(x,y,c));
    },i*180);
  }
}

// ---- Floating hearts ----
function spawnHeart(){
  const el=document.createElement('div');
  const emojis=['❤','💕','💖','💗','🌸','✨'];
  el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  el.style.cssText=`
    position:absolute;
    left:${5+Math.random()*90}%;
    bottom:0;
    font-size:${16+Math.random()*22}px;
    opacity:0.85;
    animation:floatUp ${4+Math.random()*4}s ease-in forwards;
    pointer-events:none;
  `;
  document.getElementById('floats').appendChild(el);
  setTimeout(()=>el.remove(),(8)*1000);
}

function moreHearts(){
  for(let i=0;i<20;i++) setTimeout(spawnHeart, i*120);
}

// ambient hearts
setInterval(()=>{ if(Math.random()<0.35) spawnHeart(); },1800);

// ---- Loop ----
let frame=0;
function loop(){
  requestAnimationFrame(loop);
  drawBg();
  // draw sparks on bg canvas
  for(let i=sparks.length-1;i>=0;i--){
    sparks[i].update();sparks[i].draw();
    if(sparks[i].alpha<=0)sparks.splice(i,1);
  }
  // heart canvas
  hctx.clearRect(0,0,hc.width,hc.height);
  particles.forEach(p=>{p.update();p.draw();});
  frame++;
}
loop();

// Auto fireworks on load
setTimeout(triggerFireworks,1000);
setTimeout(moreHearts,600);
</script>
</body>
</html>
